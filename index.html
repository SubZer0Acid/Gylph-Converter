<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>No Man's Sky GlyphMaster</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 2rem 1rem; min-height: 100vh; background-image: url('img/portalbg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat; color: white; }
        
        /* Hidden Trigger Button - Left, 60% Down */
        #hiddenBtn { 
            position: fixed; 
            top: 60%; 
            left: 0; 
            width: 15px; 
            height: 15px; 
            background: transparent; 
            border: none; 
            cursor: pointer; 
            z-index: 9999; 
            transform: translateY(-50%);
        }

        .box { background: rgba(0, 0, 0, 0.8); padding: 1.5rem; border-radius: 8px; max-width: 600px; margin: 0 auto; border: 1px solid #444; }
        input[type="text"], input[type="number"], select { background-color: #000000; color: #ffffff; border: 1px solid #555; width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        .glyph-grid { display: none; margin-top: 15px; text-align: center; }
        .glyph-btn { width: 40px; cursor: pointer; margin: 2px; border: 1px solid #555; }
        .result-glyph { width: 30px; margin: 2px; border: 1px solid #777; }
        .results-container { display: flex; gap: 20px; max-width: 800px; margin: 1rem auto; justify-content: center; }
        .result-box { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; flex: 1; }
        h1 { text-align: center; text-shadow: 2px 2px 4px #000; margin-bottom: 5px; }
        .signature { text-align: center; margin-bottom: 20px; font-style: italic; color: #ccc; line-height: 1.4; }
        .warning { color: #ff6666; font-weight: bold; }
        .footer-images { text-align: center; margin-top: 30px; }
        .footer-image { width: 300px; margin: 10px; border: 1px solid #555; cursor: pointer; }
    </style>
</head>
<body>

    <button id="hiddenBtn" onclick="generateBatch()"></button>

    <h1>No Man's Sky GlyphMaster</h1>
    <div class="signature">Created By SubZer0Acid<br>Leader Of The Phantom-Zer0 Civ</div>
    
    <div class="box">
        <label>Reality Index (0-255):</label>
        <input type="number" id="galaxyIndex" value="0" min="0" max="255">

        <label>Input Type:</label>
        <select id="inputType" onchange="toggleInputs()">
            <option value="1">Voxel Inputs (X, Y, Z)</option>
            <option value="2">Portal/Dec Address</option>
            <option value="3">Galactic Address (XXXX:YYYY:ZZZZ:SSSS)</option>
            <option value="4">12-Char Glyph Sequence</option>
            <option value="5">Universal Address (0x...)</option>
        </select>

        <div id="textInputArea">
            <label id="inputLabel">Enter Value:</label>
            <input type="text" id="rawInput" placeholder="Enter data">
        </div>

        <div id="glyphSelector" class="glyph-grid">
            <p>Sequence: <span id="seqDisplay" style="font-weight:bold; font-size: 1.2rem;">------------</span></p>
            <div id="glyphGrid"></div>
            <button onclick="clearSeq()" style="margin-top:10px;">Clear Sequence</button>
        </div>
        
        <button onclick="process()" style="background:#28a745; color:white; border:none; padding:10px; width:100%; cursor:pointer; margin-top:10px;">Convert</button>
    </div>

    <div class="results-container">
        <div id="output" class="result-box"></div>
        <div id="voxelOutput" class="result-box" style="white-space: pre-wrap;"></div>
    </div>

    <div class="footer-images">
        <a href="img/CORE_VOID_MAP_256_v7.webp" target="_blank"><img src="img/CORE_VOID_MAP_256_v7.webp" class="footer-image" alt="Core Void Map"></a>
        <a href="img/Glyphs.jpg" target="_blank"><img src="img/Glyphs.jpg" class="footer-image" alt="Glyph Decoder"></a>
    </div>

    <script>
        let currentSeq = Array(12).fill('-');
        let lastResult = null;

        function toggleInputs() {
            const type = document.getElementById('inputType').value;
            const textInputArea = document.getElementById('textInputArea');
            const glyphSelector = document.getElementById('glyphSelector');
            const label = document.getElementById('inputLabel');
            
            if(type === '4') {
                textInputArea.style.display = 'none';
                glyphSelector.style.display = 'block';
            } else {
                textInputArea.style.display = 'block';
                glyphSelector.style.display = 'none';
                if(type === '1') label.innerText = "Planet, System, X, Y, Z (comma separated):";
                else if(type === '2') label.innerText = "Portal Hex String:";
                else if(type === '3') label.innerText = "Galactic Address (XXXX:YYYY:ZZZZ:SSSS):";
                else if(type === '5') label.innerText = "Universal Address (0x...):";
            }
        }

        const grid = document.getElementById('glyphGrid');
        "0123456789abcdef".split("").forEach(char => {
            let img = document.createElement('img');
            img.src = `img/glyphs/${char.toLowerCase()}.png`;
            img.className = 'glyph-btn';
            img.onclick = () => {
                let idx = currentSeq.indexOf('-');
                if(idx !== -1) {
                    currentSeq[idx] = char.toUpperCase();
                    document.getElementById('seqDisplay').innerText = currentSeq.join('');
                }
            };
            grid.appendChild(img);
        });

        function clearSeq() { currentSeq = Array(12).fill('-'); document.getElementById('seqDisplay').innerText = "------------"; }

        function renderGlyphs(hexString) {
            let html = '<div style="margin-top:10px;">';
            for(let char of hexString) {
                if("0123456789ABCDEF".includes(char.toUpperCase())) {
                    html += `<img src="img/glyphs/${char.toLowerCase()}.png" class="result-glyph">`;
                }
            }
            html += '</div>';
            return html;
        }

        function process() {
            const type = document.getElementById('inputType').value;
            const galaxy = parseInt(document.getElementById('galaxyIndex').value) || 0;
            const inputValRaw = (type === '4') ? currentSeq.join('') : document.getElementById('rawInput').value.trim();
            
            let p, sss, xxx, yy, zzz;
            let portalCode = "";

            try {
                if(type === '1') {
                    [p, sss, xxx, yy, zzz] = inputValRaw.split(',').map(v => parseInt(v.trim()));
                    portalCode = `${p.toString(16)}${sss.toString(16).padStart(3,'0')}${(yy&0xFF).toString(16).padStart(2,'0')}${(zzz&0xFFF).toString(16).padStart(3,'0')}${(xxx&0xFFF).toString(16).padStart(3,'0')}`;
                } else if (type === '3') {
                    const parts = inputValRaw.split(':');
                    xxx = parseInt(parts[0], 16) - 2047; yy = parseInt(parts[1], 16) - 127; zzz = parseInt(parts[2], 16) - 2047; sss = parseInt(parts[3], 16);
                    p = 1;
                    portalCode = `${p.toString(16)}${sss.toString(16).padStart(3,'0')}${(yy&0xFF).toString(16).padStart(2,'0')}${(zzz&0xFFF).toString(16).padStart(3,'0')}${(xxx&0xFFF).toString(16).padStart(3,'0')}`;
                } else if (type === '5') {
                    const clean = inputValRaw.toLowerCase().replace('0x', '');
                    p = parseInt(clean.substring(2, 3), 16); sss = parseInt(clean.substring(3, 6), 16);
                    yy = (parseInt(clean.substring(8, 10), 16) > 127) ? parseInt(clean.substring(8, 10), 16) - 256 : parseInt(clean.substring(8, 10), 16);
                    zzz = (parseInt(clean.substring(10, 13), 16) > 2047) ? parseInt(clean.substring(10, 13), 16) - 4096 : parseInt(clean.substring(10, 13), 16);
                    xxx = (parseInt(clean.substring(13, 16), 16) > 2047) ? parseInt(clean.substring(13, 16), 16) - 4096 : parseInt(clean.substring(13, 16), 16);
                    portalCode = clean.substring(2);
                } else {
                    portalCode = inputValRaw;
                    p = parseInt(portalCode[0], 16); sss = parseInt(portalCode.substring(1, 4), 16);
                    yy = (parseInt(portalCode.substring(4, 6), 16) > 127) ? parseInt(portalCode.substring(4, 6), 16) - 256 : parseInt(portalCode.substring(4, 6), 16);
                    zzz = (parseInt(portalCode.substring(6, 9), 16) > 2047) ? parseInt(portalCode.substring(6, 9), 16) - 4096 : parseInt(portalCode.substring(6, 9), 16);
                    xxx = (parseInt(portalCode.substring(9, 12), 16) > 2047) ? parseInt(portalCode.substring(9, 12), 16) - 4096 : parseInt(portalCode.substring(9, 12), 16);
                }

                lastResult = { galaxy, xxx, yy, zzz, p };
                const gx = (xxx + 2047) & 0xFFFF; const gy = (yy + 127) & 0xFFFF; const gz = (zzz + 2047) & 0xFFFF;
                const ua = "00" + p.toString(16).toUpperCase() + sss.toString(16).toUpperCase().padStart(3, '0') + galaxy.toString(16).toUpperCase().padStart(2, '0') + (yy & 0xFF).toString(16).toUpperCase().padStart(2, '0') + (zzz & 0xFFF).toString(16).toUpperCase().padStart(3, '0') + (xxx & 0xFFF).toString(16).toUpperCase().padStart(3, '0');
                const isCore = (gx >= 0x07FA && gx <= 0x0802) && (gy >= 0x007A && gy <= 0x0081) && (gz >= 0x07FC && gz <= 0x0806);
                
                const statusText = isCore ? "Core Void Detected" : "Standard Space";
                
                document.getElementById('output').innerHTML = `${renderGlyphs(portalCode)}<p><strong>Universal Address:</strong> ${ua}</p><p><strong>Galactic:</strong> ${gx.toString(16).toUpperCase().padStart(4,'0')}:${gy.toString(16).toUpperCase().padStart(4,'0')}:${gz.toString(16).toUpperCase().padStart(4,'0')}:${sss.toString(16).toUpperCase().padStart(4,'0')}</p><p><strong>Portal Code:</strong> ${portalCode.toUpperCase()}</p><p><strong>Status:</strong> <span class="${isCore ? 'warning' : ''}">${statusText}</span></p>`;
                document.getElementById('voxelOutput').innerText = JSON.stringify({ "UniverseAddress": { "RealityIndex": galaxy, "GalacticAddress": { "VoxelX": xxx, "VoxelY": yy, "VoxelZ": zzz, "SolarSystemIndex": sss, "PlanetIndex": p } } }, null, 4);
            } catch(e) { alert("Invalid input format!"); }
        }

        function generateBatch() {
            if (!lastResult) { alert("Please run 'Convert' first!"); return; }
            let output = [];
            for (let i = 0; i <= 4095; i++) {
                let formattedIndex = i.toString().padStart(4, '0');
                output.push({ 
                    "UniverseAddress": { 
                        "RealityIndex": lastResult.galaxy, 
                        "GalacticAddress": { 
                            "VoxelX": lastResult.xxx, 
                            "VoxelY": lastResult.yy, 
                            "VoxelZ": lastResult.zzz, 
                            "SolarSystemIndex": formattedIndex, 
                            "PlanetIndex": lastResult.p 
                        } 
                    }, 
                    "Position": [1.0, 1.0, 1.0], 
                    "Facing": [1.0, 1.0, 1.0], 
                    "TeleporterType": "SpacestationFixPosition", 
                    "Name": formattedIndex, 
                    "CalcWarpOffset": false, 
                    "IsFeatured": false 
                });
            }
            const win = window.open("", "_blank");
            win.document.write(`<pre>${JSON.stringify(output, null, 4)}</pre>`);
        }
        toggleInputs();
    </script>
</body>
</html>
