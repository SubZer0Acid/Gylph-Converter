<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMS Coordinate Converter</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px; }
        #results { margin-top: 2rem; padding: 1rem; background: #f4f4f4; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>NMS Glyph Converter</h1>
    
    <div class="input-group">
        <label>Portal Address (e.g., 100101001001)</label>
        <input type="text" id="portalInput" placeholder="Enter 12-char hex code">
    </div>
    
    <button onclick="convert()">Convert to Coordinates</button>

    <div id="results">
        <p><strong>Galactic Coord:</strong> <span id="resGC">-</span></p>
        <p><strong>Voxel X, Y, Z:</strong> <span id="resVoxel">-</span></p>
    </div>

    <script>
        function convert() {
            const raw = document.getElementById('portalInput').value.trim().toUpperCase();
            if (raw.length !== 12) { alert("Invalid length. Must be 12 characters."); return; }

            // Extract logic from your Python script
            const p = parseInt(raw[0], 16);
            const sss = parseInt(raw.substring(1, 4), 16);
            const yy_hex = parseInt(raw.substring(4, 6), 16);
            const zzz_hex = parseInt(raw.substring(6, 9), 16);
            const xxx_hex = parseInt(raw.substring(9, 12), 16);

            const xxx = (xxx_hex > 2047) ? (xxx_hex - 4096) : xxx_hex;
            const yy = (yy_hex > 127) ? (yy_hex - 256) : yy_hex;
            const zzz = (zzz_hex > 2047) ? (zzz_hex - 4096) : zzz_hex;

            // Calculate Galactic
            const gx = (xxx + 2047) & 0xFFFF;
            const gy = (yy + 127) & 0xFFFF;
            const gz = (zzz + 2047) & 0xFFFF;

            document.getElementById('resGC').innerText = 
                `${gx.toString(16).toUpperCase().padStart(4, '0')}:${gy.toString(16).toUpperCase().padStart(4, '0')}:${gz.toString(16).toUpperCase().padStart(4, '0')}:${sss.toString(16).toUpperCase().padStart(4, '0')}`;
            
            document.getElementById('resVoxel').innerText = `${xxx}, ${yy}, ${zzz}`;
        }
    </script>
</body>
</html>
