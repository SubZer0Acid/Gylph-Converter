<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NMS GlyphMaster</title>
    <link type="text/css" rel="stylesheet" href="css/glyphs.css">
</head>

<body>
    <div class="bg-overlay"></div>
    <div class="content">
      <div class="title">
        <i class="portal"></i>
        <span>NMS GlyphMaster</span>
      </div>

      <div class="menu">
        <ul class="tabs-menu">
          <li class="current"><a href="#tab-1">Share Coordinates</a></li>
          <li><a href="#tab-2">Convert Portal Code</a></li>
          <li><a href="#tab-3">Galactic Coordinates</a></li>
        </ul>
      </div>

      <div class="tab">
        <div id="tab-1" class="tab-content">
          <div class="sharecoords">
            <div class="titletext">Share your portal Coordinates:</div>
            <div class="glyphsblock">
              <i class="glyph-0" data-id="0"></i><i class="glyph-1" data-id="1"></i>
              <i class="glyph-2" data-id="2"></i><i class="glyph-3" data-id="3"></i>
              <i class="glyph-4" data-id="4"></i><i class="glyph-5" data-id="5"></i>
              <i class="glyph-6" data-id="6"></i><i class="glyph-7" data-id="7"></i>
              <i class="glyph-8" data-id="8"></i><i class="glyph-9" data-id="9"></i>
              <i class="glyph-A" data-id="A"></i><i class="glyph-B" data-id="B"></i>
              <i class="glyph-C" data-id="C"></i><i class="glyph-D" data-id="D"></i>
              <i class="glyph-E" data-id="E"></i><i class="glyph-F" data-id="F"></i>
            </div>
            <div class="sharecoordsbox">
              <div class="clickedglyphs"></div>
              <button class="clearglyphs">Clear</button>
            </div>
          </div>
        </div>

        <div id="tab-2" class="tab-content" style="display:none;">
          <div class="loadcoords">
            <div class="titletext">Portal code to Glyphs:</div>
            <input class="glyphs" maxlength="12" placeholder="Paste code here...">
            <div class="result"></div>
          </div>
        </div>

        <div id="tab-3" class="tab-content" style="display:none;">
          <div class="loadcoords">
            <div class="titletext">Galactic Address to Glyphs:</div>
            <input class="gacoords" placeholder="000F:000F:000F:000F" maxlength="19">
            <div class="portalglyphs"></div>
          </div>
        </div>
      </div>
    </div>

    <script src='js/glyphs.js'></script>
</body>
</html>
