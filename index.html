<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>No Man's Sky GlyphMaster</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 2rem 1rem; min-height: 100vh; background-image: url('img/portalbg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat; color: white; }
        
        #atlasImg { position: fixed; top: 10px; left: 10px; width: 200px; z-index: 5000; border: 1px solid #555; border-radius: 5px; }
        #infoBtn { position: fixed; top: 0; right: 0; width: 30px; height: 30px; background: transparent; border: none; cursor: pointer; z-index: 10000; }
        #toggleMapBtn { position: fixed; top: 40px; right: 5px; background: #333; color: white; border: 1px solid #555; padding: 5px; cursor: pointer; z-index: 10000; font-size: 12px; }
        #hiddenBtn { position: fixed; top: 62%; left: 16%; width: 15px; height: 15px; background: transparent; border: none; cursor: pointer; z-index: 9999; transform: translate(-50%, -50%); }

        .box { background: rgba(0, 0, 0, 0.8); padding: 1.5rem; border-radius: 8px; max-width: 600px; margin: 0 auto; border: 1px solid #444; }
        input[type="text"], input[type="number"], select { background-color: #000000; color: #ffffff; border: 1px solid #555; width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        .glyph-grid { display: none; margin-top: 15px; text-align: center; }
        .glyph-btn { width: 40px; cursor: pointer; margin: 2px; border: 1px solid #555; }
        .result-glyph { width: 30px; margin: 2px; border: 1px solid #777; }
        .results-container { display: flex; gap: 20px; max-width: 800px; margin: 1rem auto; justify-content: center; }
        .result-box { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; flex: 1; }
        
        .map-container { position: fixed; bottom: 10px; right: 10px; width: 1000px; height: 550px; background: rgba(0,0,0,0.9); padding: 5px; border-radius: 8px; border: 1px solid #444; z-index: 9998; overflow: hidden; }
        .map-header { background:#222; padding:5px; text-align:right; cursor: pointer; }
        
        h1 { text-align: center; text-shadow: 2px 2px 4px #000; margin-bottom: 5px; }
        .signature { text-align: center; margin-bottom: 20px; font-style: italic; color: #ccc; line-height: 1.4; }
        .warning { color: #ff6666; font-weight: bold; }
        .footer-images { text-align: center; margin-top: 30px; }
        .footer-image { width: 300px; margin: 10px; border: 1px solid #555; cursor: pointer; }
    </style>
</head>
<body>

    <img src="img/Galactic%20Atlas.jpg" id="atlasImg" alt="Galactic Atlas">
    <button id="infoBtn" onclick="openGlyphsInfo()"></button>
    <button id="toggleMapBtn" onclick="toggleMap()">Toggle Map</button>
    <button id="hiddenBtn" onclick="generateBatch()"></button>

    <h1>No Man's Sky GlyphMaster</h1>
    <div class="signature">Created By SubZer0Acid<br>Leader Of The Phantom-Zer0 Civ</div>
    
    <div class="box">
        <label>Reality Index (0-255):</label>
        <input type="number" id="galaxyIndex" value="0" min="0" max="255">
        <label>Input Type:</label>
        <select id="inputType" onchange="toggleInputs()">
            <option value="1">Voxel Inputs (X, Y, Z)</option>
            <option value="2">Portal/Dec Address</option>
            <option value="3">Galactic Address (XXXX:YYYY:ZZZZ:SSSS)</option>
            <option value="4">12-Char Glyph Sequence</option>
            <option value="5">Universal Address (0x...)</option>
        </select>
        <div id="textInputArea">
            <label id="inputLabel">Enter Value:</label>
            <input type="text" id="rawInput" placeholder="Enter data">
        </div>
        <div id="glyphSelector" class="glyph-grid">
            <p>Sequence: <span id="seqDisplay" style="font-weight:bold; font-size: 1.2rem;">------------</span></p>
            <div id="glyphGrid"></div>
            <button onclick="clearSeq()" style="margin-top:10px;">Clear Sequence</button>
        </div>
        <button onclick="process()" style="background:#28a745; color:white; border:none; padding:10px; width:100%; cursor:pointer; margin-top:10px;">Convert</button>
    </div>

    <div class="results-container">
        <div id="output" class="result-box"></div>
        <div id="voxelOutput" class="result-box" style="white-space: pre-wrap;"></div>
    </div>

    <div id="mapWindow" class="map-container">
        <div class="map-header" onclick="toggleMap()">
            <a href="https://havenmap.online/map/latest" target="_blank" style="color:white; font-size:12px; text-decoration:none; margin-right:10px;">Open New Tab ↗</a>
            <span style="color:#aaa; font-size:12px;">[-] Minimize</span>
        </div>
        <iframe src="https://havenmap.online/map/latest" width="100%" height="90%" style="border:none;" title="Haven Cartographer"></iframe>
    </div>

    <div class="footer-images">
        <a href="img/CORE_VOID_MAP_256_v7.webp" target="_blank"><img src="img/CORE_VOID_MAP_256_v7.webp" class="footer-image" alt="Core Void Map"></a>
        <a href="img/Glyphs.jpg" target="_blank"><img src="img/Glyphs.jpg" class="footer-image" alt="Glyph Decoder"></a>
    </div>

    <script>
        function toggleMap() {
            const map = document.getElementById('mapWindow');
            map.style.display = (map.style.display === 'none') ? 'block' : 'none';
        }
        // ... rest of your existing JS logic ...

        let lastResult = null;

        function toggleInputs() { /* ... */ }
        const grid = document.getElementById('glyphGrid');
        // ... (Re-use your previous working script for process/batch here)
        function process() { /* ... */ }
        function generateBatch() { /* ... */ }
        toggleInputs();
    </script>
</body>
</html>
