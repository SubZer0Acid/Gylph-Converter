<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NMS GlyphMaster</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .box { background: #f4f4f4; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .glyph-grid { display: none; margin-top: 15px; text-align: center; }
        .glyph-btn { width: 40px; cursor: pointer; margin: 2px; border: 1px solid #ccc; }
        select, input { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
        #output { border-top: 2px solid #ccc; margin-top: 1rem; padding-top: 1rem; }
    </style>
</head>
<body>

    <h1>NMS GlyphMaster</h1>
    
    <div class="box">
        <label>Input Type:</label>
        <select id="inputType" onchange="toggleInputs()">
            <option value="1">Voxel Inputs (X, Y, Z)</option>
            <option value="2">Portal/Dec Address</option>
            <option value="3">Galactic Address (XXXX:YYYY:ZZZZ:SSSS)</option>
            <option value="4">12-Char Glyph Sequence</option>
        </select>

        <div id="textInputArea">
            <label id="inputLabel">Enter Value:</label>
            <input type="text" id="rawInput" placeholder="Enter data">
        </div>

        <div id="glyphSelector" class="glyph-grid">
            <p>Sequence: <span id="seqDisplay" style="font-weight:bold; font-size: 1.2rem;">------------</span></p>
            <div id="glyphGrid"></div>
            <button onclick="clearSeq()" style="margin-top:10px;">Clear Sequence</button>
        </div>
        
        <button onclick="process()" style="background:#28a745; color:white; border:none; padding:10px; width:100%; cursor:pointer; margin-top:10px;">Convert</button>
    </div>

    <div id="output"></div>

    <script>
        let currentSeq = Array(12).fill('-');

        function toggleInputs() {
            const type = document.getElementById('inputType').value;
            const textInputArea = document.getElementById('textInputArea');
            const glyphSelector = document.getElementById('glyphSelector');
            const label = document.getElementById('inputLabel');

            if(type === '4') {
                textInputArea.style.display = 'none';
                glyphSelector.style.display = 'block';
            } else {
                textInputArea.style.display = 'block';
                glyphSelector.style.display = 'none';
                if(type === '1') label.innerText = "Planet, System, X, Y, Z (comma separated):";
                else if(type === '2') label.innerText = "Portal Hex String:";
                else if(type === '3') label.innerText = "Galactic Address (XXXX:YYYY:ZZZZ:SSSS):";
            }
        }

        // Initialize Glyph Grid
        const grid = document.getElementById('glyphGrid');
        "0123456789abcdef".split("").forEach(char => {
            let img = document.createElement('img');
            img.src = `${char.toLowerCase()}.png`;
            img.className = 'glyph-btn';
            img.onclick = () => {
                let idx = currentSeq.indexOf('-');
                if(idx !== -1) {
                    currentSeq[idx] = char.toUpperCase();
                    document.getElementById('seqDisplay').innerText = currentSeq.join('');
                }
            };
            grid.appendChild(img);
        });

        function clearSeq() { currentSeq = Array(12).fill('-'); document.getElementById('seqDisplay').innerText = "------------"; }

        function process() {
            const type = document.getElementById('inputType').value;
            const inputVal = (type === '4') ? currentSeq.join('') : document.getElementById('rawInput').value.trim();
            let p, sss, xxx, yy, zzz;

            try {
                if(type === '1') {
                    [p, sss, xxx, yy, zzz] = inputVal.split(',').map(v => parseInt(v.trim()));
                } else if (type === '3') {
                    const parts = inputVal.split(':');
                    xxx = parseInt(parts[0], 16) - 2047;
                    yy = parseInt(parts[1], 16) - 127;
                    zzz = parseInt(parts[2], 16) - 2047;
                    sss = parseInt(parts[3], 16);
                    p = 1;
                } else { // Handles Portal/Dec (2) and Glyph (4)
                    p = parseInt(inputVal[0], 16);
                    sss = parseInt(inputVal.substring(1, 4), 16);
                    const y_hex = parseInt(inputVal.substring(4, 6), 16);
                    const z_hex = parseInt(inputVal.substring(6, 9), 16);
                    const x_hex = parseInt(inputVal.substring(9, 12), 16);
                    xxx = (x_hex > 2047) ? x_hex - 4096 : x_hex;
                    yy = (y_hex > 127) ? y_hex - 256 : y_hex;
                    zzz = (z_hex > 2047) ? z_hex - 4096 : z_hex;
                }

                const gx = (xxx + 2047) & 0xFFFF;
                const gy = (yy + 127) & 0xFFFF;
                const gz = (zzz + 2047) & 0xFFFF;

                document.getElementById('output').innerHTML = `
                    <p><strong>Galactic:</strong> ${gx.toString(16).toUpperCase().padStart(4,'0')}:${gy.toString(16).toUpperCase().padStart(4,'0')}:${gz.toString(16).toUpperCase().padStart(4,'0')}:${sss.toString(16).toUpperCase().padStart(4,'0')}</p>
                    <p><strong>Voxel:</strong> X:${xxx}, Y:${yy}, Z:${zzz}</p>
                    <p><strong>Portal Code:</strong> ${p.toString(16).toUpperCase()}${sss.toString(16).toUpperCase().padStart(3,'0')}${ (yy & 0xFF).toString(16).toUpperCase().padStart(2,'0')}${(zzz & 0xFFF).toString(16).toUpperCase().padStart(3,'0')}${(xxx & 0xFFF).toString(16).toUpperCase().padStart(3,'0')}</p>
                `;
            } catch(e) { alert("Invalid input format!"); }
        }
        toggleInputs();
    </script>
</body>
</html>
