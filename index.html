<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NMS GlyphMaster</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .box { background: #f4f4f4; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .glyph-grid { display: none; margin-top: 15px; } /* Hidden by default */
        .glyph-btn { width: 40px; cursor: pointer; margin: 2px; }
        .glyph-slot { display: inline-block; width: 30px; height: 30px; border: 1px solid #999; margin: 2px; line-height: 30px; background: #fff; }
    </style>
</head>
<body>

    <h1>NMS GlyphMaster</h1>
    
    <div class="box">
        <label>Input Type:</label>
        <select id="inputType" onchange="toggleInputs()">
            <option value="1">Voxel Inputs</option>
            <option value="3">Galactic Address</option>
            <option value="4">12-Char Glyph Sequence</option>
        </select>

        <div id="textInputArea">
            <label>Input:</label>
            <input type="text" id="rawInput" placeholder="Enter value">
        </div>

        <div id="glyphSelector" class="glyph-grid">
            <p>Sequence: <span id="seqDisplay">------------</span></p>
            <div id="glyphGrid"></div>
        </div>
        
        <button onclick="process()" style="margin-top:10px;">Convert</button>
    </div>

    <div id="output"></div>

    <script>
        let currentSeq = Array(12).fill('-');

        function toggleInputs() {
            const type = document.getElementById('inputType').value;
            const textArea = document.getElementById('textInputArea');
            const glyphArea = document.getElementById('glyphSelector');
            
            if(type === '4') {
                textArea.style.display = 'none';
                glyphArea.style.display = 'block';
            } else {
                textArea.style.display = 'block';
                glyphArea.style.display = 'none';
            }
        }

        // Initialize Glyph Grid
        const grid = document.getElementById('glyphGrid');
        "0123456789ABCDEF".split("").forEach(char => {
            let img = document.createElement('img');
            img.src = `${char}.png`;
            img.className = 'glyph-btn';
            img.onclick = () => {
                let idx = currentSeq.indexOf('-');
                if(idx !== -1) {
                    currentSeq[idx] = char;
                    document.getElementById('seqDisplay').innerText = currentSeq.join('');
                }
            };
            grid.appendChild(img);
        });

        function process() {
            // ... (Use the logic from previous steps to calculate based on inputs)
            alert("Processing logic goes here based on selected type!");
        }
        
        toggleInputs(); // Set initial state
    </script>
</body>
</html>
