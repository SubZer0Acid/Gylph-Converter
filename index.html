<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>No Man's Sky GlyphMaster</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 2rem 1rem;
            min-height: 100vh;
            background-image: url('img/portalbg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white;
        }

        .box { 
            background: rgba(0, 0, 0, 0.8);
            padding: 1.5rem; 
            border-radius: 8px; 
            max-width: 600px; 
            margin: 0 auto; 
            border: 1px solid #444;
        }

        input[type="text"], select {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #555;
            width: 100%; 
            padding: 10px; 
            margin: 8px 0; 
            box-sizing: border-box;
        }

        .glyph-grid { display: none; margin-top: 15px; text-align: center; }
        .glyph-btn { width: 40px; cursor: pointer; margin: 2px; border: 1px solid #555; }
        .result-glyph { width: 30px; margin: 2px; border: 1px solid #777; }
        
        #output { 
            max-width: 800px; 
            margin: 1rem auto; 
            display: flex; 
            gap: 15px;
            justify-content: center;
        }
        .output-panel {
            background: rgba(0,0,0,0.8); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #444;
            flex: 1;
        }
        
        h1 { text-align: center; text-shadow: 2px 2px 4px #000; margin-bottom: 5px; }
        .signature { text-align: center; margin-bottom: 20px; font-style: italic; color: #ccc; line-height: 1.4; }
        .warning { color: #ff6666; font-weight: bold; margin-top: 10px; }
        pre { font-size: 0.85rem; overflow-x: auto; }
    </style>
</head>
<body>

    <h1>No Man's Sky GlyphMaster</h1>
    <div class="signature">
        Created By SubZer0Acid<br>
        Leader Of The Phantom-Zer0 Civ
    </div>
    
    <div class="box">
        <label>Input Type:</label>
        <select id="inputType" onchange="toggleInputs()">
            <option value="1">Voxel Inputs (X, Y, Z)</option>
            <option value="2">Portal/Dec Address</option>
            <option value="3">Galactic Address (XXXX:YYYY:ZZZZ:SSSS)</option>
            <option value="4">12-Char Glyph Sequence</option>
            <option value="5">Universal Address (0x...)</option>
        </select>

        <div id="textInputArea">
            <label id="inputLabel">Enter Value:</label>
            <input type="text" id="rawInput" placeholder="Enter data">
        </div>

        <div id="glyphSelector" class="glyph-grid">
            <p>Sequence: <span id="seqDisplay" style="font-weight:bold; font-size: 1.2rem;">------------</span></p>
            <div id="glyphGrid"></div>
            <button onclick="clearSeq()" style="margin-top:10px;">Clear Sequence</button>
        </div>
        
        <button onclick="process()" style="background:#28a745; color:white; border:none; padding:10px; width:100%; cursor:pointer; margin-top:10px;">Convert</button>
    </div>

    <div id="output"></div>

    <script>
        let currentSeq = Array(12).fill('-');

        function toggleInputs() {
            const type = document.getElementById('inputType').value;
            const textInputArea = document.getElementById('textInputArea');
            const glyphSelector = document.getElementById('glyphSelector');
            const label = document.getElementById('inputLabel');

            if(type === '4') {
                textInputArea.style.display = 'none';
                glyphSelector.style.display = 'block';
            } else {
                textInputArea.style.display = 'block';
                glyphSelector.style.display = 'none';
                if(type === '1') label.innerText = "Planet, System, X, Y, Z (comma separated):";
                else if(type === '2') label.innerText = "Portal Hex String:";
                else if(type === '3') label.innerText = "Galactic Address (XXXX:YYYY:ZZZZ:SSSS):";
                else if(type === '5') label.innerText = "Universal Address (0x...):";
            }
        }

        const grid = document.getElementById('glyphGrid');
        "0123456789abcdef".split("").forEach(char => {
            let img = document.createElement('img');
            img.src = `img/glyphs/${char.toLowerCase()}.png`;
            img.className = 'glyph-btn';
            img.onclick = () => {
                let idx = currentSeq.indexOf('-');
                if(idx !== -1) {
                    currentSeq[idx] = char.toUpperCase();
                    document.getElementById('seqDisplay').innerText = currentSeq.join('');
                }
            };
            grid.appendChild(img);
        });

        function clearSeq() { currentSeq = Array(12).fill('-'); document.getElementById('seqDisplay').innerText = "------------"; }

        function renderGlyphs(hexString) {
            let html = '<div style="margin-top:10px;">';
            for(let char of hexString) {
                if("0123456789ABCDEF".includes(char.toUpperCase())) {
                    html += `<img src="img/glyphs/${char.toLowerCase()}.png" class="result-glyph">`;
                }
            }
            html += '</div>';
            return html;
        }

        function process() {
            const type = document.getElementById('inputType').value;
            let inputVal = (type === '4') ? currentSeq.join('') : document.getElementById('rawInput').value.trim();
            let p, sss, xxx, yy, zzz;

            try {
                if(type === '1') {
                    [p, sss, xxx, yy, zzz] = inputVal.split(',').map(v => parseInt(v.trim()));
                    inputVal = `${p.toString(16)}${sss.toString(16).padStart(3,'0')}${(yy&0xFF).toString(16).padStart(2,'0')}${(zzz&0xFFF).toString(16).padStart(3,'0')}${(xxx&0xFFF).toString(16).padStart(3,'0')}`;
                } else if (type === '3') {
                    const parts = inputVal.split(':');
                    xxx = parseInt(parts[0], 16) - 2047;
                    yy = parseInt(parts[1], 16) - 127;
                    zzz = parseInt(parts[2], 16) - 2047;
                    sss = parseInt(parts[3], 16);
                    p = 1;
                    inputVal = `${p.toString(16)}${sss.toString(16).padStart(3,'0')}${(yy&0xFF).toString(16).padStart(2,'0')}${(zzz&0xFFF).toString(16).padStart(3,'0')}${(xxx&0xFFF).toString(16).padStart(3,'0')}`;
                } else if (type === '5') {
                    const clean = inputVal.toLowerCase().replace('0x', '');
                    p = parseInt(clean.substring(2, 3), 16);
                    sss = parseInt(clean.substring(3, 6), 16);
                    yy = parseInt(clean.substring(8, 10), 16);
                    yy = (yy > 127) ? yy - 256 : yy;
                    zzz = parseInt(clean.substring(10, 13), 16);
                    zzz = (zzz > 2047) ? zzz - 4096 : zzz;
                    xxx = parseInt(clean.substring(13, 16), 16);
                    xxx = (xxx > 2047) ? xxx - 4096 : xxx;
                    inputVal = `${p.toString(16)}${sss.toString(16).padStart(3,'0')}${(yy&0xFF).toString(16).padStart(2,'0')}${(zzz&0xFFF).toString(16).padStart(3,'0')}${(xxx&0xFFF).toString(16).padStart(3,'0')}`;
                } else {
                    p = parseInt(inputVal[0], 16);
                    sss = parseInt(inputVal.substring(1, 4), 16);
                    const y_hex = parseInt(inputVal.substring(4, 6), 16);
                    const z_hex = parseInt(inputVal.substring(6, 9), 16);
                    const x_hex = parseInt(inputVal.substring(9, 12), 16);
                    xxx = (x_hex > 2047) ? x_hex - 4096 : x_hex;
                    yy = (y_hex > 127) ? y_hex - 256 : y_hex;
                    zzz = (z_hex > 2047) ? z_hex - 4096 : z_hex;
                }

                const gx = (xxx + 2047) & 0xFFFF;
                const gy = (yy + 127) & 0xFFFF;
                const gz = (zzz + 2047) & 0xFFFF;

                const isCore = (gx >= 0x07FA && gx <= 0x0802) && (gy >= 0x007A && gy <= 0x0081) && (gz >= 0x07FC && gz <= 0x0806);
                const status = isCore ? "Core Void Detected" : "Standard Space";

                const universeJson = {
                    "RealityIndex": p,
                    "GalacticAddress": {
                        "VoxelX": xxx,
                        "VoxelY": yy,
                        "VoxelZ": zzz,
                        "SolarSystemIndex": sss,
                        "PlanetIndex": p
                    }
                };

                document.getElementById('output').innerHTML = `
                    <div class="output-panel">
                        ${renderGlyphs(inputVal)}
                        <p><strong>Galactic:</strong> ${gx.toString(16).toUpperCase().padStart(4,'0')}:${gy.toString(16).toUpperCase().padStart(4,'0')}:${gz.toString(16).toUpperCase().padStart(4,'0')}:${sss.toString(16).toUpperCase().padStart(4,'0')}</p>
                        <p><strong>Voxel:</strong> X:${xxx}, Y:${yy}, Z:${zzz}</p>
                        <p><strong>Portal Code:</strong> ${inputVal.toUpperCase()}</p>
                        <p class="${isCore ? 'warning' : ''}"><strong>Status:</strong> ${status}</p>
                    </div>
                    <div class="output-panel">
                        <strong>Universe Address Data:</strong>
                        <pre>${JSON.stringify(universeJson, null, 4)}</pre>
                    </div>
                `;
            } catch(e) { alert("Invalid input format!"); }
        }
        toggleInputs();
    </script>
</body>
</html>
