<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NMS GlyphMaster</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; text-align: center; }
        .glyph-slot { display: inline-block; width: 40px; height: 40px; border: 2px solid #333; margin: 2px; font-size: 20px; line-height: 40px; cursor: pointer; background: #eee; }
        .glyph-btn { width: 50px; cursor: pointer; margin: 5px; }
        #sequence { margin: 1rem 0; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

    <h1>Glyph Sequence Input</h1>
    <div id="sequence">------------</div>
    <div id="glyphGrid"></div>
    <button onclick="clearSeq()">Clear</button>

    <div id="output" style="margin-top:20px; text-align: left;"></div>

    <script>
        let currentSeq = Array(12).fill('-');
        const glyphGrid = document.getElementById('glyphGrid');

        // Create clickable images for 0-9 and A-F
        const hexChars = "0123456789ABCDEF".split("");
        hexChars.forEach(char => {
            let img = document.createElement('img');
            img.src = `${char}.png`; // Assumes files are named 0.png, A.png, etc.
            img.className = 'glyph-btn';
            img.onclick = () => addGlyph(char);
            glyphGrid.appendChild(img);
        });

        function addGlyph(char) {
            let index = currentSeq.indexOf('-');
            if(index !== -1) {
                currentSeq[index] = char;
                updateDisplay();
            }
            if(!currentSeq.includes('-')) process();
        }

        function clearSeq() {
            currentSeq = Array(12).fill('-');
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('sequence').innerText = currentSeq.join('');
        }

        function process() {
            const raw = currentSeq.join('');
            // Logic from your script
            const p = parseInt(raw[0], 16);
            const sss = parseInt(raw.substring(1, 4), 16);
            const y_hex = parseInt(raw.substring(4, 6), 16);
            const z_hex = parseInt(raw.substring(6, 9), 16);
            const x_hex = parseInt(raw.substring(9, 12), 16);
            
            const xxx = (x_hex > 2047) ? x_hex - 4096 : x_hex;
            const yy = (y_hex > 127) ? y_hex - 256 : y_hex;
            const zzz = (z_hex > 2047) ? z_hex - 4096 : z_hex;

            const gx = (xxx + 2047) & 0xFFFF;
            const gy = (yy + 127) & 0xFFFF;
            const gz = (zzz + 2047) & 0xFFFF;

            document.getElementById('output').innerHTML = `
                <div style="background:#f4f4f4; padding:10px;">
                <p><strong>Galactic:</strong> ${gx.toString(16).toUpperCase().padStart(4,'0')}:${gy.toString(16).toUpperCase().padStart(4,'0')}:${gz.toString(16).toUpperCase().padStart(4,'0')}:${sss.toString(16).toUpperCase().padStart(4,'0')}</p>
                <p><strong>Voxel:</strong> X:${xxx}, Y:${yy}, Z:${zzz}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
